JobDefs {
  Name = "UNIX-zfs-vss"
  Type = Backup
  Level = Incremental
  Client = bareos-fd
  Accurate = yes
  FileSet = "UNIX-zfs-vss"                     # selftest fileset
  Schedule = "WeeklyCycle"
  Client Run Before Job = "/bin/sh /root/scripts/zfs_vss.sh"
  Run Script {
    Runs When = After
    Runs On Client = yes
    Runs On Success = yes
    Runs On Failure = yes
    Command = "/bin/sh /root/scripts/zfs_vss.sh -r"
  }
  Messages = Standard
  Pool = Full                              # default
  Full Backup Pool = Full                  # write Full Backups into "Full" Pool
  Differential Backup Pool = Differential  # write Diff Backups into "Differential" Pool
  Incremental Backup Pool = Incremental    # write Incr Backups into "Incremental" Pool
  Priority = 10
  Write Bootstrap = "/var/db/bareos/%c.bsr"
}

JobDefs {
  Name = "UNIX-zfs-vss-atlas"
  Type = Backup
  Level = Incremental
  Client = bareos-fd
  Accurate = yes
  FileSet = "UNIX-zfs-vss-atlas"                     # selftest fileset
  Schedule = "WeeklyCycle"
  Client Run Before Job = "/bin/sh /root/scripts/zfs_vss.sh"
  Run Script {
    Runs When = After
    Runs On Client = yes
    Runs On Success = yes
    Runs On Failure = yes
    Command = "/bin/sh /root/scripts/zfs_vss.sh -r"
  }
  Messages = Standard
  Pool = Atlas-full                              # default
  Full Backup Pool = Atlas-full                  # write Full Backups into "Full" Pool
  Differential Backup Pool = Atlas-diff  # write Diff Backups into "Differential" Pool
  Incremental Backup Pool = Atlas-inc    # write Incr Backups into "Incremental" Pool
  Priority = 10
  Write Bootstrap = "/var/db/bareos/%c.bsr"
}
