FileSet {
  Name = "LinuxAll"
  Description = "Backup all regular filesystems, determined by filesystem type."
  Include {
    Options {
      Exclude = yes

      # Wow, this file gets massive
      WildFile = "/var/log/lastlog"

      WildDir = "/var/db/bareos/*"
      WildDir = "/var/db/bareos/storage/*"
      WildDir = "/proc/*"
      WildDir = "/dev/*"
      WildDir = "/snap/*"
      WildDir = "/sys/*"
      WildDir = "/tmp/*"
      WildDir = "/var/tmp/*"
      WildFile = "/swap.img"
    }
    Options {
      Signature = XXH128 # calculate checksum per file
      Compression = LZ4
      One FS = No        # change into other filessytems
      Sparse = Yes
      FS Type = btrfs
      FS Type = ext2     # filesystems of given types will be backed up
      FS Type = ext3     # others will be ignored
      FS Type = ext4
      FS Type = reiserfs
      FS Type = jfs
      FS Type = vfat     # UEFI
      FS Type = xfs
      FS Type = zfs
    }
    File = /
  }
}
