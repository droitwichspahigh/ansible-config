---

- name: install and activate postfix
  hosts: mailserver
  vars:
    srv: postfix
  become: true
  tasks:
  - name: install {{ srv }}
    pkgng:
      name: '{{ srv }}-sasl' cyrus-sasl-saslauthd
  - name: configure Postfix
    ansible.builtin.template:
      src: '../../templates/postfix/main.cf'
      dest: /usr/local/etc/postfix/main.cf
      owner: root
      group: wheel
      mode: '0644'
  - name: add {{ srv }} runsv directory
    ansible.builtin.file:
      path: '/etc/sv/{{ srv }}'
      state: directory
      mode: '0755'
  - name: add {{ srv }} runsv file
    ansible.builtin.template:
      src: '../../templates/runit/{{ srv }}_run'
      dest: '/etc/sv/{{ srv }}/run'
      owner: root
      group: wheel
      mode: '0755'
  - name: enable {{ srv }} boot
    ansible.builtin.file:
      src: '/etc/sv/{{ srv }}'
      dest: '/var/service/{{ srv }}'
      state: link
  - name: enable saslauthd jobs
    community.general.sysrc:
      name: '{{ item.name }}'
      value: '{{ item.val }}'
    loop:
      - { name: 'saslauthd_enable', val: 'yes' }
      - { name: 'saslauthd_flags', val: '-a kerberos5' }
  - name: set {{ srv }} as mailer
    ansible.builtin.file:
      src: /usr/local/share/postfix/mailer.conf.postfix
      dest: /etc/mail/mailer.conf
      state: link
      force: true
